<!DOCTYPE html>
<html>
<head>
    <title>I'm Sorry 💔</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to top, #ffd6d6, #fff0f5);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 100px;
            color: #ff4d4d;
            font-size: 50px;
        }

        p {
            font-size: 20px;
            color: #333;
            max-width: 500px;
            margin: auto;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff1a1a;
        }

        /* HEART STYLE */
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: red;
            transform: rotate(45deg);
            animation: float 6s linear infinite;
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: red;
            border-radius: 50%;
        }

        .heart::before {
            top: -10px;
            left: 0;
        }

        .heart::after {
            left: -10px;
            top: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(45deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(45deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <h1>I'm Sorry 😔</h1>
    <p>
        I didn’t mean to hurt you...  
        You mean so much to me, and I regret everything.  
        Please give me another chance. 💖
    </p>

    <button onclick="showMessage()">Click me 💌</button>

    <script>
        function showMessage() {
            alert("I miss you so much… please talk to me again 🥺💖");
        }

        // CREATE FLOATING HEARTS
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 300);
    </script>

</body>
</html>
